name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'

    - name: Add conda to system path
      run: echo $CONDA/bin >> $GITHUB_PATH

    - name: Install dependencies
      run: conda env update --file environment.yml --name base

    - name: Lint with flake8
      run: |
        conda install flake8 -y
        # Stop build on syntax errors or undefined names only
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
          --exclude=.git,__pycache__,iot/esp32_firmware.ino,ppt/

    - name: Verify core modules import
      run: |
        python -c "from aads.heap import MaxHeap, Task; print('heap OK')"
        python -c "from aads.dijkstra import dijkstra, FARM_GRAPH; print('dijkstra OK')"
        python -c "from aads.merge_sort import merge_sort; print('merge_sort OK')"
        python -c "from aads.rbt import RedBlackTree; print('rbt OK')"
        python -c "import data.generate_dataset; print('dataset generator OK')" || true
